# Render Blueprint — deploys Cube Bench as a single web service.
# The Express server serves both the API and the built React client. Accounts,
# sessions, and early-access emails live in Supabase (Postgres), so no
# persistent disk is needed and the free tier works.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cubebench
    runtime: node
    plan: free # bump to "starter" ($7/mo) to stop the free-tier idle spin-down
    # Build both packages, then produce the client bundle the server serves.
    # --include=dev forces vite/tsc to install even if NODE_ENV=production.
    buildCommand: npm --prefix server install && npm --prefix client install --include=dev && npm --prefix client run build
    startCommand: npm --prefix server start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "24"
      # Supabase transaction-pooler connection string (port 6543). Required.
      - key: DATABASE_URL
        sync: false
      # Public base URL of the deployed app. Set to your onrender.com URL
      # first, then your custom domain once DNS is pointed. Used by Stripe
      # redirects and Google origin checks.
      - key: APP_URL
        sync: false
      # Optional — the app runs without these (features stay gated off until set).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
